<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhe o Número - Lupino Edition</title>

    <!-- ===== BOOTSTRAP ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ===== ICONES DO BOOTSTRAP ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- ===== CSS AQUI ===== -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ===== CABEÇALHO ===== -->
    <header class="menu-fixo">
        <nav>
            <ul>
                <li><a href="index.html"><i class="bi bi-house-door-fill"></i> Início</a></li>
                <li><a href="sobre.html"><i class="bi bi-trophy-fill"></i> Ranking</a></li>
            </ul>
        </nav>
    </header>

    <!-- ===== FUNDO ANIMADO ===== -->
    <div class="game-wrapper">

        <!-- ===== LUPINO -> LADO ESQUERDO TESTE ===== 
        <img src="img/lupin.png" alt="Mascote Lupino" class="mascote">-->

        <!-- ===== PAINEL CENTRAL ===== -->
        <div class="game-card">
            <div class="game-header">
                <h1 class="game-title">Adivinhe o Número</h1>
                <p class="game-subtitle">Lupino Edition</p>

                <!-- ===== DIFICULDADES ===== -->
                <div class="game-dificuldade mb-3">
                    <label for="nivelSelect">Dificuldade:</label>
                    <select id="nivelSelect" class="form-select w-53 mx-auto">
                        <option value="facil">Fácil (1–10)</option>
                        <option value="medio">Médio (1–50)</option>
                        <option value="dificil">Difícil (1–100)</option>
                    </select>
                </div>
               
                <!-- ===== STATUS DO JOGO ===== -->
                <div class="game-status">
                    <!--<span id="nivel">Dificuldade: </span>-->
                    <span id="pontuacao">Pontuação: 0</span>
                    <span id="recorde">Recorde: </span>
                </div>
            </div>

            <!-- ===== TENTATIVAS COM ICONES ===== -->
            <div id="tentativas" class="tentativas">
                ❤️ ❤️ ❤️
            </div>

            <!-- ===== MENSAGEM DE DICAS ===== -->
            <p id="mensagem">Você tem 3 tentativas!</p>
            <p id="timerMsg"></p>

            <!-- ===== CAMPO DE ENTRADA ===== -->
            <input type="number" id="entrada" class="form-control w-50 mx-auto mb-3" min="1" max="10">

            <!-- ===== BOTÕES ===== -->
            <div>
                <button id="btnChutar" class="btn btn-custom me-2">Chutar</button>
                <button id="btnNovo" class="btn btn-secondary">Novo Jogo</button>
            </div>
        </div>

        <!-- ===== LUPINO -> LADO DIREITO TESTE ===== -->
        <div class="game-wrapper">
            <img src="img/lupin-dir.png" alt="Mascote Lupino" class="mascote">
        </div>

        <!-- ===== RODAPÉ ===== -->
        <footer class="game-footer">
            <p>© 2026 Lupin Studio</p>
        </footer>
    </div>

    <!-- ===== JS AQUI ===== -->
    <script src="js/script.js"></script>
</body>

</html>
